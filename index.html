    }

    .header a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .header a:hover {
      text-decoration: underline;
    }

    .jp-wrap {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* Filtros de categoria */
  .jp-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .jp-filter button {
      font-size: 13px; padding: 6px 16px; border-radius: 9999px;
      border: 1px solid #cbd5e1; background: transparent; color: #64748b;
      cursor: pointer;
    }
    .jp-filter button.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }

    .jp-kanji { font-size: 3.2rem; font-weight: bold; margin: 8px 0; }
    @media (max-width: 480px) {
      .jp-kanji { font-size: 2.6rem; }
    }

    /* Toggle de modo */
    .jp-mode {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }

    .jp-mode span {
      font-size: 13px;
      color: #64748b;
    }

    .jp-mode button {
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid #cbd5e1;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .jp-mode button.active {
      background: #0f766e;
      color: #99f6e4;
      border-color: #0f766e;
    }

    /* Barra de progresso */
    .jp-progress-bar {
      background: #e2e8f0;
      border-radius: 99px;
      height: 7px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .jp-progress-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 99px;
      transition: width 0.35s;
    }

    .jp-progress-label {
      font-size: 13px;
      color: #64748b;
      display: flex;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    /* Card da palavra */
    .jp-card {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      padding: 36px 20px;
      text-align: center;
      margin-bottom: 16px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: border-color 0.25s, background 0.25s;
    }

    .jp-card.correct {
      border-color: #16a34a;
      background: #f0fdf4;
    }

    .jp-card.incorrect {
      border-color: #dc2626;
      background: #fef2f2;
    }

    .jp-kanji {
      font-size: 3rem;
      font-weight: bold;
      color: #111827;
      line-height: 1.15;
      margin: 0 0 8px;
    }

    .jp-hint {
      font-size: 14px;
      color: #64748b;
      min-height: 20px;
    }

    /* Input */
    .jp-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .jp-input-field {
      flex: 1;
      padding: 11px 14px;
      font-size: 1em;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      color: #1e293b;
      background: #ffffff;
    }

    .jp-input-field:focus {
      border-color: #2563eb;
    }

    /* Botões */
    .jp-btn {
      padding: 10px 18px;
      font-size: 0.95em;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .jp-btn:active {
      transform: scale(0.97);
    }

    .jp-btn-primary {
      background: #2563eb;
      color: #ffffff;
    }

    .jp-btn-primary:hover {
      background: #1d4ed8;
    }

    .jp-btn-secondary {
      background: #e2e8f0;
      color: #475569;
    }

    .jp-btn-secondary:hover {
      background: #cbd5e1;
    }

    .jp-btn-success {
      background: #16a34a;
      color: #ffffff;
    }

    .jp-btn-success:hover {
      background: #15803d;
    }

    .jp-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    /* Feedback */
    .jp-feedback {
      font-size: 1em;
      font-weight: 600;
      min-height: 22px;
      text-align: center;
      margin-bottom: 14px;
    }

    .jp-feedback.ok    { color: #16a34a; }
    .jp-feedback.err   { color: #dc2626; }
    .jp-feedback.info  { color: #2563eb; }

    /* Estatísticas */
    .jp-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      border-top: 1px solid #e2e8f0;
      padding-top: 16px;
    }

    .jp-stat {
      background: #f1f5f9;
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
    }

    .jp-stat-val {
      font-size: 1.6em;
      font-weight: 700;
      color: #1e3a8a;
    }

    .jp-stat-lbl {
      font-size: 12px;
      color: #64748b;
      margin-top: 3px;
    }

    /* Responsivo */
    @media (max-width: 480px) {
      .jp-kanji { font-size: 2.4rem; }
      .jp-btns  { gap: 6px; }

.jp-card { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; padding: 40px 20px; text-align: center; min-height: 140px; }

  </style>

    }

    function setMode(m) {
      mode = m;
      document.getElementById("btn-romaji").classList.toggle("active", m === "romaji");
      document.getElementById("btn-hiragana").classList.toggle("active", m === "hiragana");
      document.getElementById("jp-input").placeholder =
        m === "romaji" ? "Digite em romaji (ex: koneko)" : "Digite em hiragana (ex: こねこ)";
      loadWord();
    }

    function getDeck() {
      const f = activecat === "Todos" ? vocab : vocab.filter(v => v.cat === activecat);
      return [...f].sort(() => Math.random() - 0.5);
    }

    function resetSession() {
      deck = getDeck();
      idx = 0; correct = 0; total = 0; answered = false;
      updateStats();
      loadWord();
    }

    function loadWord() {
      if (!deck.length) return;
      const item = deck[idx];
      document.getElementById("jp-word").textContent   = item.word;
      document.getElementById("jp-hint").textContent   = "";
      document.getElementById("jp-input").value        = "";
      document.getElementById("jp-input").disabled     = false;
      document.getElementById("jp-feedback").textContent = "";
      document.getElementById("jp-feedback").className   = "jp-feedback";
      document.getElementById("jp-btn-next").style.display = "none";
      document.getElementById("jp-card").className        = "jp-card";
      answered = false;
      updateProgress();
      document.getElementById("jp-input").focus();
    }

    function updateProgress() {
      const n   = deck.length;
      const pct = n ? Math.round((idx / n) * 100) : 0;
      document.getElementById("jp-prog-fill").style.width  = pct + "%";
      document.getElementById("jp-prog-label").textContent = "Carta " + (idx + 1) + " de " + n;
      document.getElementById("jp-prog-pct").textContent   = pct + "%";
    }

    function updateStats() {
      document.getElementById("st-correct").textContent = correct;
      document.getElementById("st-total").textContent   = total;
      document.getElementById("st-pct").textContent     = total ? Math.round((correct / total) * 100) + "%" : "—";
    }

    function checkAnswer() {
      if (answered) { nextWord(); return; }
      const val = document.getElementById("jp-input").value.trim().toLowerCase();
      if (!val) { setFeedback("Por favor, digite uma resposta.", "info"); return; }

      const item     = deck[idx];
      const expected = mode === "romaji" ? item.romaji.toLowerCase() : item.hiragana;
      answered = true;
      total++;
      document.getElementById("jp-input").disabled        = true;
      document.getElementById("jp-btn-next").style.display = "inline-block";

      if (val === expected) {
        correct++;
        document.getElementById("jp-card").className = "jp-card correct";
        setFeedback("🎉 Correto!  " + item.hiragana + "  —  " + item.meaning, "ok");
      } else {
        document.getElementById("jp-card").className = "jp-card incorrect";
        const show = mode === "romaji" ? item.romaji : item.hiragana;
        setFeedback("❌ Incorreto. Resposta: " + show + " (" + item.meaning + ")", "err");
      }
      updateStats();
    }

    function revealHint() {
      if (answered) return;
      document.getElementById("jp-hint").textContent = "Significado: " + deck[idx].meaning;
    }

    function nextWord() {
      idx++;
      if (idx >= deck.length) {
        const pct = Math.round((correct / total) * 100);
        setFeedback("Ciclo completo! Aproveitamento: " + pct + "%. Recomeçando...", "info");
        setTimeout(() => { deck = getDeck(); idx = 0; answered = false; loadWord(); }, 2200);
        return;
      }
      loadWord();
    }

    function setFeedback(msg, cls) {
      const el = document.getElementById("jp-feedback");
      el.textContent = msg;
      el.className   = "jp-feedback " + cls;
    }

    document.getElementById("jp-input").addEventListener("keydown", e => {
      if (e.key === "Enter") { if (!answered) checkAnswer(); else nextWord(); }
    });

    buildFilter();
    resetSession();
  </script>
